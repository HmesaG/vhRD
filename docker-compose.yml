version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vhrd-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vhrd
      POSTGRES_USER: vhrd
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vhrd2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./database/03-realtime.sql:/docker-entrypoint-initdb.d/03-realtime.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vhrd -d vhrd"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    container_name: vhrd-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://vhrd:${DB_PASSWORD:-vhrd2026}@postgres:5432/vhrd
      JWT_SECRET: ${JWT_SECRET:-vhrd-secret-key-change-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vhrd-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
